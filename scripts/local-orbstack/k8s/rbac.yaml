apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  namespace: momokaya-pipeline
---
# Local sandbox only: skip tuning the argo-workflows chart's own executor
# Role/RoleBinding and just grant this SA cluster-admin in-cluster. Never do
# this against momokaya or any shared cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-runner-local-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: momokaya-pipeline
