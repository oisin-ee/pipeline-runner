version: 1

rules:
  test-first:
    path: .pipeline/rules/test-first.md
  verification:
    path: .pipeline/rules/verification.md

skills:
  critique:
    path: ~/dev/skills/.agents/skills/critique/SKILL.md
  diagnose:
    path: ~/dev/skills/.agents/skills/diagnose/SKILL.md
  doubt:
    path: ~/dev/skills/.agents/skills/doubt/SKILL.md
  fix:
    path: ~/dev/skills/.agents/skills/fix/SKILL.md
  improve:
    path: ~/dev/skills/.agents/skills/improve/SKILL.md
  library-first-development:
    path: ~/dev/skills/.agents/skills/library-first-development/SKILL.md
  migrate:
    path: ~/dev/skills/.agents/skills/migrate/SKILL.md
  optimize:
    path: ~/dev/skills/.agents/skills/optimize/SKILL.md
  research:
    path: ~/dev/skills/.agents/skills/research/SKILL.md
  scope:
    path: ~/dev/skills/.agents/skills/scope/SKILL.md
  secure:
    path: ~/dev/skills/.agents/skills/secure/SKILL.md
  spec:
    path: ~/dev/skills/.agents/skills/spec/SKILL.md
  test:
    path: ~/dev/skills/.agents/skills/test/SKILL.md
  trace:
    path: ~/dev/skills/.agents/skills/trace/SKILL.md
  verify:
    path: ~/dev/skills/.agents/skills/verify/SKILL.md
mcp_servers:
  serena:
    ref:
      path: .mcp.json
  context7:
    ref:
      path: .mcp.json
  semgrep:
    ref:
      path: .mcp.json
  backlog:
    ref:
      path: .mcp.json
  qdrant:
    ref:
      path: .mcp.json
  github-readonly:
    ref:
      path: .mcp.json
  playwright:
    ref:
      path: .mcp.json

profiles:
  orchestrator:
    runner: codex
    instructions:
      path: .pipeline/prompts/orchestrator.md
    rules: [test-first, verification]
    skills: [scope, doubt]
    mcp_servers: [backlog, qdrant, github-readonly]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
  pipeline-researcher:
    runner: codex
    description: Research the requested task and produce structured findings.
    instructions:
      path: .pipeline/prompts/researcher.md
    rules: [test-first]
    skills: [research, spec, scope]
    mcp_servers: [serena, context7, backlog, qdrant, github-readonly]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: json_schema
      schema_path: .pipeline/schemas/research.schema.json
      repair:
        enabled: true
        max_attempts: 1
  pipeline-inspector:
    runner: codex
    description: Inspect the repository without modifying files.
    instructions:
      path: .pipeline/prompts/inspector.md
    skills: [research]
    mcp_servers: [serena, context7]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: text
  pipeline-test-writer:
    runner: codex
    description: Add focused failing tests for the requested behavior.
    instructions:
      path: .pipeline/prompts/test-writer.md
    rules: [test-first]
    skills: [test]
    mcp_servers: [serena, context7]
    tools: [read, list, grep, glob, bash, edit, write]
    filesystem:
      mode: workspace-write
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: text
  pipeline-code-writer:
    runner: codex
    description: Implement production code until the failing tests pass.
    instructions:
      path: .pipeline/prompts/code-writer.md
    rules: [test-first]
    skills: [trace, test, fix, library-first-development]
    mcp_servers: [serena, context7, semgrep]
    tools: [read, list, grep, glob, bash, edit, write]
    filesystem:
      mode: workspace-write
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: text
  pipeline-epic-router:
    runner: codex
    description: Route epic sub-tickets into fixed implementation tracks.
    instructions:
      path: .pipeline/prompts/epic-router.md
    mcp_servers: [backlog, github-readonly]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: json_schema
      schema_path: .pipeline/schemas/epic-plan.schema.json
      repair:
        enabled: true
        max_attempts: 1
  pipeline-acceptance-reviewer:
    runner: codex
    description: Audit the finished change against every acceptance criterion.
    instructions:
      path: .pipeline/prompts/acceptance-reviewer.md
    rules: [verification]
    skills: [critique, doubt]
    mcp_servers: [serena, context7, semgrep, github-readonly, playwright]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: json_schema
      schema_path: .pipeline/schemas/acceptance.schema.json
      repair:
        enabled: true
        max_attempts: 1
  pipeline-thermo-nuclear-reviewer:
    runner: codex
    description: Perform the final thermo-nuclear code quality review of the integration branch.
    instructions:
      path: ~/dev/skills/.agents/skills/critique/SKILL.md
    skills: [critique]
    mcp_servers: [serena, semgrep, github-readonly]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: json_schema
      schema_path: .pipeline/schemas/review.schema.json
      repair:
        enabled: true
        max_attempts: 1
  pipeline-verifier:
    runner: codex
    description: Verify checks, implementation fit, and final evidence.
    instructions:
      path: .pipeline/prompts/verifier.md
    rules: [verification]
    skills: [verify, critique, secure, optimize]
    mcp_servers: [serena, semgrep, github-readonly, playwright]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: json_schema
      schema_path: .pipeline/schemas/verify.schema.json
      repair:
        enabled: true
        max_attempts: 1
  pipeline-learner:
    runner: codex
    description: Store durable lessons from the completed run.
    instructions:
      path: .pipeline/prompts/learner.md
    skills: [migrate]
    mcp_servers: [qdrant, backlog]
    tools: [read, list, grep, glob, bash]
    filesystem:
      mode: read-only
      allow: ["**/*"]
      deny: ["node_modules/**", "dist/**", ".git/**"]
    network:
      mode: inherit
    output:
      format: json_schema
      schema_path: .pipeline/schemas/learn.schema.json
      repair:
        enabled: true
        max_attempts: 1
