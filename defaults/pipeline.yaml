version: 1
default_workflow: inspect
orchestrator:
  profile: moka-orchestrator
# PIPE-83 architecture hardening — ON by default so moka actually uses it.
# context_handoff: nodes pass curated NodeHandoffs downstream instead of raw
# transitive transcripts (kills the re-hydration latency/quality leak).
context_handoff:
  enabled: true
# repo_map: prepend a tree-sitter + PageRank ranked code map to agent prompts,
# seeded by the node's task + handoff artifacts, within token_budget.
repo_map:
  enabled: true
# durability: journal each terminal node result so a killed run resumes from the
# last passed node without re-running (or re-spending tokens on) finished work.
durability:
  enabled: true
# parallel_worktrees: opt-in git-worktree isolation for parallel child nodes —
# each parallel child runs on its own branch with its own per-worktree opencode
# server so concurrent edits and sessions can't collide. OFF by default; enable
# explicitly with parallel_worktrees.enabled.
token_budget:
  default_context_window: 200000
  max_context_pct: 50
  fan_out_width:
    default: 4
    by_category:
      green: 2
entrypoints:
  quick:
    schedule: quick-schedule
    description: Compact planner-generated pipeline for small work
  execute:
    schedule: execute-schedule
    description: Full planner-generated pipeline for repository work
  inspect:
    workflow: inspect
    description: Read-only repository inspection
hooks:
  functions:
    generated-defaults-audit:
      kind: command
      command: [node, -e, "const fs=require('node:fs'); fs.writeFileSync(process.env.PIPELINE_HOOK_RESULT, JSON.stringify({status:'pass',summary:'Generated defaults audit passed'}));"]
      trusted: true
      timeout_ms: 5000
      output_limit_bytes: 4096
  on:
    workflow.start:
      - id: generated-defaults-audit
        function: generated-defaults-audit
        failure: fail
runner_command:
  environment:
    setup:
      # Environment bootstrap (dependency install, toolchain pinning, codegen) is
      # OWNED BY THE TARGET REPO and is REQUIRED — moka does not guess it. The
      # repo's own CI already encodes the correct sequence (package manager,
      # mise/asdf/nvm toolchains, generated clients), which moka cannot reliably
      # reproduce. moka runs the repo's declared entrypoint here: an executable
      # .moka/bootstrap.sh, or a "moka:setup" package.json script. If the repo
      # declares neither, the run fails loudly rather than silently under-
      # provisioning the workspace.
      - command: sh
        args:
          - -c
          - |
            if [ -f .moka/bootstrap.sh ]; then
              echo "moka: running repo bootstrap (.moka/bootstrap.sh)"
              # Run under the script's own shebang (e.g. bash), not forced `sh`:
              # forcing dash breaks bash-feature bootstraps (`set -o pipefail`).
              chmod +x .moka/bootstrap.sh
              ./.moka/bootstrap.sh
            elif [ -f package.json ] && grep -q '"moka:setup"' package.json; then
              echo "moka: running repo bootstrap (npm run moka:setup)"
              npm run moka:setup
            else
              echo "moka: repo environment bootstrap is REQUIRED but was not found." >&2
              echo "Add an executable .moka/bootstrap.sh (or a 'moka:setup' package.json script)" >&2
              echo "that installs dependencies and any toolchain/codegen this repo needs." >&2
              echo "moka does not guess dependency/toolchain setup." >&2
              exit 1
            fi
      # Set up package-owned pipeline support + the opencode model registration
      # (.opencode/opencode.json, which declares the gpt-5.5-* reasoning selectors)
      # on every run, so opencode-backed agents in the pod resolve their models
      # instead of failing with "Model not found". Both commands are idempotent
      # and write no repo-local pipeline config.
      - command: moka
        args: [init]
      - command: moka
        args: [install-commands]
scheduler:
  commands:
    quick:
      schedule: quick-schedule
      catalog: quick
    execute:
      schedule: execute-schedule
      catalog: execute
  node_catalogs:
    quick:
      required_categories: [intake, red, green, mechanical, verification]
      nodes:
        backlog-intake:
          category: intake
          profile: moka-researcher
          models: [openai/gpt-5.5]
          reasoning_effort: medium
        red-tests:
          category: red
          profile: moka-test-writer
          models: [openai/gpt-5.5, kimi-for-coding/kimi-k2-thinking]
          reasoning_effort: high
        green-implementation:
          category: green
          profile: moka-code-writer
          models: [opencode-go/qwen3.7-max, openai/gpt-5.5, kimi-for-coding/k2p6]
          reasoning_effort: high
        verification:
          category: verification
          profile: moka-verifier
          models: [openai/gpt-5.5]
          reasoning_effort: medium
    execute:
      required_categories: [intake, research, red, green, mechanical, acceptance, verification, learn]
      nodes:
        backlog-intake:
          category: intake
          profile: moka-researcher
          models: [openai/gpt-5.5]
          reasoning_effort: medium
        research:
          category: research
          profile: moka-researcher
          models: [openai/gpt-5.5, kimi-for-coding/k2p6]
          reasoning_effort: medium
        red-tests:
          category: red
          profile: moka-test-writer
          models: [openai/gpt-5.5, kimi-for-coding/kimi-k2-thinking]
          reasoning_effort: high
        green-backend:
          category: green
          profile: moka-code-writer
          models: [opencode-go/qwen3.7-max, openai/gpt-5.5, kimi-for-coding/k2p6]
          reasoning_effort: high
        green-frontend:
          category: green
          profile: moka-code-writer
          models: [openai/gpt-5.5, kimi-for-coding/k2p6, opencode-go/qwen3.7-max]
          reasoning_effort: high
        acceptance-review:
          category: acceptance
          profile: moka-acceptance-reviewer
          models: [openai/gpt-5.5]
          reasoning_effort: medium
        verification:
          category: verification
          profile: moka-verifier
          models: [openai/gpt-5.5]
          reasoning_effort: medium
        learn:
          category: learn
          profile: moka-learner
          models: [openai/gpt-5.5]
          reasoning_effort: low
schedules:
  quick-schedule:
    baseline: quick
    planner_profile: moka-schedule-planner
    node_catalog: quick
  execute-schedule:
    baseline: execute
    planner_profile: moka-schedule-planner
    node_catalog: execute
workflows:
  inspect:
    description: Read-only repository inspection workflow.
    nodes:
      - id: inspect
        kind: agent
        profile: moka-inspector
