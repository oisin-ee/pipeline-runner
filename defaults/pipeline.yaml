version: 1
default_workflow: inspect
orchestrator:
  profile: moka-orchestrator
# PIPE-83 architecture hardening — ON by default so moka actually uses it.
# context_handoff: nodes pass curated NodeHandoffs downstream instead of raw
# transitive transcripts (kills the re-hydration latency/quality leak).
context_handoff:
  enabled: true
# repo_map: prepend a tree-sitter + PageRank ranked code map to agent prompts,
# seeded by the node's task + handoff artifacts, within token_budget.
repo_map:
  enabled: true
# durability: journal each terminal node result so a killed run resumes from the
# last passed node without re-running (or re-spending tokens on) finished work.
durability:
  enabled: true
# best_of_n / parallel_worktrees: the verifier-pattern dial. Schedule generation
# + selection are validated/tested, BUT a live end-to-end run (2026-06-16) proved
# the EXECUTION is not yet production-ready, so it stays OFF by default (on-by-
# default made real runs hang). Two runtime gaps remain — see PIPE-83.14:
#   1. The leased opencode server is rooted at the main worktree and throws
#      "Unexpected server error" when a candidate session runs with directory set
#      to its isolated worktree → candidates exit 70, retries exhaust, green loops.
#      Fix: lease a per-worktree opencode server for each candidate.
#   2. The winning candidate's file changes live in its worktree and are never
#      merged back to the main tree, so downstream nodes wouldn't see them.
# Enable explicitly (best_of_n.enabled + n:2 + categories:[green] + parallel_
# worktrees.enabled) once those land; n=2 also ~doubles green-node spend.
token_budget:
  default_context_window: 200000
  max_context_pct: 50
  fan_out_width:
    default: 4
    by_category:
      green: 2
entrypoints:
  quick:
    schedule: quick-schedule
    description: Compact planner-generated pipeline for small work
  execute:
    schedule: execute-schedule
    description: Full planner-generated pipeline for repository work
  inspect:
    workflow: inspect
    description: Read-only repository inspection
hooks:
  functions:
    generated-defaults-audit:
      kind: command
      command: [node, -e, "const fs=require('node:fs'); fs.writeFileSync(process.env.PIPELINE_HOOK_RESULT, JSON.stringify({status:'pass',summary:'Generated defaults audit passed'}));"]
      trusted: true
      timeout_ms: 5000
      output_limit_bytes: 4096
  on:
    workflow.start:
      - id: generated-defaults-audit
        function: generated-defaults-audit
        failure: fail
runner_command:
  environment:
    setup:
      - command: bun
        args: [install, --frozen-lockfile]
scheduler:
  commands:
    quick:
      schedule: quick-schedule
      catalog: quick
    execute:
      schedule: execute-schedule
      catalog: execute
  node_catalogs:
    quick:
      required_categories: [intake, red, green, mechanical, verification]
      nodes:
        backlog-intake:
          category: intake
          profile: moka-researcher
          models: [openai/gpt-5.5-medium]
        red-tests:
          category: red
          profile: moka-test-writer
          models: [openai/gpt-5.5-high, kimi-for-coding/kimi-k2-thinking]
        green-implementation:
          category: green
          profile: moka-code-writer
          models: [openai/gpt-5.5-high, kimi-for-coding/k2p6, opencode-go/qwen3.7-max]
        verification:
          category: verification
          profile: moka-verifier
          models: [openai/gpt-5.5-medium]
    execute:
      required_categories: [intake, research, red, green, mechanical, acceptance, verification, learn]
      nodes:
        backlog-intake:
          category: intake
          profile: moka-researcher
          models: [openai/gpt-5.5-medium]
        research:
          category: research
          profile: moka-researcher
          models: [openai/gpt-5.5-medium, kimi-for-coding/k2p6]
        red-tests:
          category: red
          profile: moka-test-writer
          models: [openai/gpt-5.5-high, kimi-for-coding/kimi-k2-thinking]
        green-backend:
          category: green
          profile: moka-code-writer
          models: [openai/gpt-5.5-high, kimi-for-coding/k2p6, opencode-go/qwen3.7-max]
        green-frontend:
          category: green
          profile: moka-code-writer
          models: [openai/gpt-5.5-high, kimi-for-coding/k2p6, opencode-go/qwen3.7-max]
        acceptance-review:
          category: acceptance
          profile: moka-acceptance-reviewer
          models: [openai/gpt-5.5-medium]
        verification:
          category: verification
          profile: moka-verifier
          models: [openai/gpt-5.5-medium]
        learn:
          category: learn
          profile: moka-learner
          models: [openai/gpt-5.5-low]
schedules:
  quick-schedule:
    baseline: quick
    planner_profile: moka-schedule-planner
    node_catalog: quick
  execute-schedule:
    baseline: execute
    planner_profile: moka-schedule-planner
    node_catalog: execute
workflows:
  inspect:
    description: Read-only repository inspection workflow.
    nodes:
      - id: inspect
        kind: agent
        profile: moka-inspector
