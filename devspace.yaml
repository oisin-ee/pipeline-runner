version: v2beta1
name: oisin-pipeline

profiles:
  - name: runner
    replace:
      deployments:
        pipeline-runner:
          kubectl:
            inlineManifest: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: pipeline-runner
                labels:
                  app.kubernetes.io/name: pipeline-runner
                  pipeline.oisin.dev/role: interactive-runner
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app.kubernetes.io/name: pipeline-runner
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/name: pipeline-runner
                      pipeline.oisin.dev/role: interactive-runner
                  spec:
                    serviceAccountName: pipeline-runner
                    imagePullSecrets:
                      - name: ghcr-pull-secret
                    containers:
                      - name: runner
                        image: ghcr.io/oisin-ee/pipeline-runner:latest
                        imagePullPolicy: Always
                        command:
                          - sleep
                        args:
                          - infinity
                        workingDir: /workspace/oisin-pipeline
                        env:
                          - name: CODEX_AUTH_PER_PROJECT_ACCOUNTS
                            value: "0"
                        volumeMounts:
                          - mountPath: /root/.local/share/opencode/auth.json
                            name: opencode-auth
                            readOnly: true
                            subPath: auth.json
                          - mountPath: /etc/pipeline/git-credentials
                            name: runner-git-credentials
                            readOnly: true
                          - mountPath: /root/.config/gh/hosts.yml
                            name: github-auth
                            readOnly: true
                            subPath: hosts.yml
                    volumes:
                      - name: opencode-auth
                        secret:
                          secretName: opencode-auth-1
                          defaultMode: 0400
                          items:
                            - key: auth.json
                              path: auth.json
                      - name: runner-git-credentials
                        secret:
                          secretName: oisin-bot-git-credentials
                          defaultMode: 0400
                          optional: true
                          items:
                            - key: username
                              path: username
                            - key: password
                              path: password
                            - key: identity
                              path: identity
                            - key: known_hosts
                              path: known_hosts
                      - name: github-auth
                        secret:
                          secretName: oisin-bot-github-auth
                          items:
                            - key: hosts.yml
                              path: hosts.yml
      dev:
        pipeline-runner:
          labelSelector:
            app.kubernetes.io/name: pipeline-runner
          container: runner
          workingDir: /workspace/oisin-pipeline
          env:
            - name: CODEX_AUTH_PER_PROJECT_ACCOUNTS
              value: "0"
          sync:
            - path: .:/workspace/oisin-pipeline
              excludePaths:
                - .git/
                - node_modules/
                - dist/
                - coverage/
          terminal:
            enabled: true
            command: bash
            workDir: /workspace/oisin-pipeline
