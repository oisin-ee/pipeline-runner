name: CI

# Runs the same gates as the release job, but on pull requests, so that
# branch-protection required checks EXIST for PRs. The autonomous ticket-loop
# (`moka loop`) arms `gh pr merge --auto`, which only lands a child-run PR once
# its required CI checks pass — that contract needs these checks reported here.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, typecheck, check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install nub
        run: npm i -g @nubjs/nub@0.2.7

      - name: Install dependencies
        run: nub ci

      - name: Test
        run: nub run test

      - name: Typecheck
        run: nub run typecheck

      - name: Check
        run: nub run check
