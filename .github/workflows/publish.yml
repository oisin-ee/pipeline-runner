name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      version: ${{ steps.released-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (not `latest`): bun.lock is regenerated with this exact bun, so
          # `--frozen-lockfile` below is deterministic. A floating `latest` drifted
          # to a bun whose lockfile format no longer matched the committed lock and
          # broke every release. Bump this and the lockfile together.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Typecheck
        run: bun run typecheck

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build:cli

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_TERMINAL_PROMPT: "0"

      # @semantic-release/npm bumps package.json in the workspace before publish,
      # so this is the exact version just released — unlike `npm view`, which
      # races the registry's read-after-write propagation and can return the
      # previous version. Stays "0.0.0-development" when no release happened.
      - name: Capture released version
        id: released-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  runner-image:
    name: Publish runner image
    needs: release
    # Only build an image when a real release happened (skip no-op pushes).
    if: needs.release.outputs.version != '0.0.0-development'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            PIPELINE_PACKAGE_VERSION=${{ needs.release.outputs.version }}
          tags: |
            ghcr.io/oisin-ee/pipeline-runner:${{ github.sha }}
            ghcr.io/oisin-ee/pipeline-runner:latest
