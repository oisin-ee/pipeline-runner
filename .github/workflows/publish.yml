name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: read
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@oisin-ee"

      - name: Install nub
        run: npm i -g @nubjs/nub@0.2.7

      - name: Install dependencies
        run: nub ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: nub run test

      - name: Typecheck
        run: nub run typecheck

      - name: Check
        run: nub run check

      - name: Build
        run: nub run build:cli

      # The @semantic-release/exec success hook writes `version=<nextRelease.version>`
      # to $GITHUB_OUTPUT. The version comes from semantic-release's own computed
      # release (no registry query), so it can't race npm's read-after-write the
      # way `npm view` did, and it is set only when a release is actually published.
      - name: Release
        id: release
        run: nubx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_TERMINAL_PROMPT: "0"

  runner-image:
    name: Publish runner image
    needs: release
    # Build an image only when a release was actually published (the success hook
    # leaves the output empty on no-op pushes).
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            PIPELINE_PACKAGE_VERSION=${{ needs.release.outputs.version }}
          # gh_token authenticates the Dockerfile's `chezmoi apply`, whose
          # .chezmoiexternal clones the PRIVATE oisin-ee/agent repo (and its
          # run_onchange scripts fetch mise tools from GitHub). This MUST be a PAT
          # or GitHub App token with read (contents:read) access to oisin-ee/agent
          # — the default per-repo GITHUB_TOKEN is scoped to this repo only and
          # cannot read another private repo, so the clone would 404/403 with it.
          secrets: |
            gh_token=${{ secrets.AGENT_REPO_READ_TOKEN }}
          tags: |
            ghcr.io/oisin-ee/pipeline-runner:${{ github.sha }}
            ghcr.io/oisin-ee/pipeline-runner:latest
