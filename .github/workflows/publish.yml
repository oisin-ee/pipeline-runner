name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (not `latest`): bun.lock is regenerated with this exact bun, so
          # `--frozen-lockfile` below is deterministic. A floating `latest` drifted
          # to a bun whose lockfile format no longer matched the committed lock and
          # broke every release. Bump this and the lockfile together.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Typecheck
        run: bun run typecheck

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build:cli

      # The @semantic-release/exec success hook writes `version=<nextRelease.version>`
      # to $GITHUB_OUTPUT. The version comes from semantic-release's own computed
      # release (no registry query), so it can't race npm's read-after-write the
      # way `npm view` did, and it is set only when a release is actually published.
      - name: Release
        id: release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_TERMINAL_PROMPT: "0"

  runner-image:
    name: Publish runner image
    needs: release
    # Build an image only when a release was actually published (the success hook
    # leaves the output empty on no-op pushes).
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            PIPELINE_PACKAGE_VERSION=${{ needs.release.outputs.version }}
          tags: |
            ghcr.io/oisin-ee/pipeline-runner:${{ github.sha }}
            ghcr.io/oisin-ee/pipeline-runner:latest
