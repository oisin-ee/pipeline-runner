pre-commit:
  parallel: true
  jobs:
    - name: fallow-audit
      run: npx --yes fallow audit --production --format compact
    - name: check
      run: bun run check
    - name: typecheck
      run: bun run typecheck

pre-push:
  parallel: true
  jobs:
    - name: check
      run: bun run check
    - name: typecheck
      run: bun run typecheck
