pre-commit:
  parallel: true
  jobs:
    - name: fallow-audit
      run: npx --yes fallow audit --fail-on-issues --format compact
    - name: check
      run: bun run check
    - name: typecheck
      run: bun run typecheck

pre-push:
  parallel: true
  jobs:
    - name: check
      run: bun run check
    - name: typecheck
      run: bun run typecheck

# Strip Co-Authored-By trailers locally, so this still happens once the repo runs
# lefthook directly (local core.hooksPath) instead of via the global ~/.git-hooks.
commit-msg:
  commands:
    strip-coauthored-by:
      run: |
        grep -vi '^Co-Authored-By:' {1} > {1}.tmp && mv {1}.tmp {1} || true
